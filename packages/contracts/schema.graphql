enum Activity {
  INDOOR_SIGHTSEEING
  OUTDOOR_SIGHTSEEING
  SKIING
  SURFING
}

type ActivityRankingResult {
  days: [DailyActivityRanking!]!
  location: Location!
}

type ActivityScore {
  activity: Activity!
  reason: String!
  score: Int!
}

type DailyActivityRanking {
  date: String!
  rankings: [ActivityScore!]!
}

type Location {
  country: String!
  latitude: Float!
  longitude: Float!
  name: String!
}

type Query {
  activityRankings(city: String!): ActivityRankingResult!
}
